- type: replace
  path: /instance_groups/name=opensearch_data/jobs/-
  value: &add-keystore-credentials-errand
    name: add_keystore_credentials
    release: opensearch

- type: replace
  path: /instance_groups/name=opensearch_manager/jobs/-
  value:
    <<: *add-keystore-credentials-errand

- type: replace
  path: /instance_groups/name=opensearch_dashboards/jobs/-
  value:
    <<: *add-keystore-credentials-errand

- type: replace
  path: /instance_groups/name=maintenance/jobs/-
  value:
    <<: *add-keystore-credentials-errand

- type: replace
  path: /instance_groups/name=ingestor/jobs/-
  value:
    <<: *add-keystore-credentials-errand

- type: replace
  path: /instance_groups/name=ingestor_s3/jobs/-
  value:
    <<: *add-keystore-credentials-errand

# Complete notification configuration with secrets_prefix, email_accounts, and channels
- type: replace
  path: /instance_groups/name=opensearch_manager/jobs/name=opensearch/properties/opensearch/notifications?
  value: &complete-notification-config
    secrets_prefix: ((opensearch-notifications-secrets-prefix))
    email_accounts:
    - from_address: ((platform_from))
      name: platform_ses
      smtp_host: ((platform_smtp_host))
      smtp_method: ((smtp_method))
      smtp_port: ((smtp_port))
    channels:
    - description: Critical security alerts for OpenSearch cluster
      enabled: true
      message: A security event has been detected in the OpenSearch cluster.
      name: platform-alerts
      sender_name: platform_ses
      subject: OpenSearch Security Alert
      type: email
      users: ((platform_users))

- type: replace
  path: /instance_groups/name=ingestor/jobs/name=opensearch/properties/opensearch/notifications?
  value:
    <<: *complete-notification-config

- type: replace
  path: /instance_groups/name=opensearch_data/jobs/name=opensearch/properties/opensearch/notifications?
  value:
    <<: *complete-notification-config

- type: replace
  path: /instance_groups/name=opensearch_dashboards/jobs/name=opensearch/properties/opensearch/notifications?
  value:
    <<: *complete-notification-config

- type: replace
  path: /instance_groups/name=maintenance/jobs/name=opensearch/properties/opensearch/notifications?
  value:
    <<: *complete-notification-config

- type: replace
  path: /instance_groups/name=ingestor_s3/jobs/name=opensearch/properties/opensearch/notifications?
  value:
    <<: *complete-notification-config