---
groups:
  - name: all 
    jobs:
      - deploy-opensearch-development
      - upload-dashboards-objects-development
      - smoke-tests-development
      - deploy-opensearch-staging
      - upload-dashboards-objects-staging
      - smoke-tests-staging
      - deploy-opensearch-production
      - upload-dashboards-objects-production
      - smoke-tests-production
  - name: development
    jobs:
      - deploy-opensearch-development
      - upload-dashboards-objects-development
      - smoke-tests-development
  - name: staging
    jobs:
      - deploy-opensearch-staging
      - upload-dashboards-objects-staging
      - smoke-tests-staging
  - name: production
    jobs:
      - deploy-opensearch-production
      - upload-dashboards-objects-production
      - smoke-tests-production

jobs:
    
  - name: deploy-opensearch-development
    serial_groups: [bosh-development]
    plan:
      - in_parallel:
          - get: pipeline-tasks
          - get: deploy-logs-platform-config
            trigger: true
          - get: opensearch-release
            trigger: true
          - get: opensearch-stemcell-jammy
            trigger: true
          - get: general-task
          - get: terraform-yaml
            resource: terraform-yaml-development
            trigger: true
      - task: opensearch-manifest
        image: general-task
        config:
          platform: linux
          inputs:
            - name: deploy-logs-platform-config
          run:
            path: sh
            args:
              - -exc
              - |
                bosh int deploy-logs-platform-config/opensearch-base.yml \
                -o deploy-logs-platform-config/opensearch-scaling-development.yml \
                > opensearch-manifest/manifest.yml
          outputs:
            - name: opensearch-manifest
      - task: terraform-secrets
        image: general-task
        file: deploy-logs-platform-config/ci/terraform-secrets.yml
      - put: opensearch-development-deployment
        params:
          manifest: opensearch-manifest/manifest.yml
          releases:
            - opensearch-release/*.tgz
          stemcells:
            - opensearch-stemcell-jammy/*.tgz
          ops_files:
            - deploy-logs-platform-config/opsfiles/enable-node-tls.yml
            - deploy-logs-platform-config/opsfiles/enable-dashboard-dns.yml
            - deploy-logs-platform-config/opsfiles/enable-dashboards-tls.yml
            - deploy-logs-platform-config/opsfiles/enable-oidc-tls.yml
            - deploy-logs-platform-config/opsfiles/enable-syslog.yml
            - deploy-logs-platform-config/opsfiles/opensearch-notification.yml
            - deploy-logs-platform-config/opsfiles/add-keystore-credentials-errand.yml
            - deploy-logs-platform-config/opsfiles/enable-snapshot.yml
          vars_files:
            - terraform-secrets/terraform.yml
    on_failure:
      put: slack
      params: &slack-failure-params
        text: |
          :x: FAILED to deploy platform opensearch in development
          <$ATC_EXTERNAL_URL/teams/$BUILD_TEAM_NAME/pipelines/$BUILD_PIPELINE_NAME/jobs/$BUILD_JOB_NAME/builds/$BUILD_NAME|View build details>
        channel: ((slack-channel-customer-success))
        username: ((slack-username))
        icon_url: ((slack-icon-url))
  
  - name: upload-dashboards-objects-development
    serial_groups: [bosh-development]
    plan:
      - in_parallel:
          - get: pipeline-tasks
          - get: opensearch-release
          - get: opensearch-stemcell-jammy
          - get: deploy-logs-platform-config
          - get: opensearch-development-deployment
            trigger: true
      - task: upload-dashboards-objects
        file: pipeline-tasks/bosh-logs-errand.yml
        params:
          BOSH_ENVIRONMENT: ((bosh_development_environment))
          BOSH_CLIENT: ((bosh_client))
          BOSH_CLIENT_SECRET: ((bosh_development_client_secret))
          BOSH_DEPLOYMENT: logs-platform
          BOSH_ERRAND: upload-dashboards-objects
          BOSH_FLAGS: "--keep-alive"
          BOSH_CA_CERT: ((bosh_ca_cert_store.certificate))
    on_failure:
      put: slack
      params: 
        <<: *slack-failure-params
        text: |
          :x: FAILED to upload dashboard objects for platform opensearch in development
          <$ATC_EXTERNAL_URL/teams/$BUILD_TEAM_NAME/pipelines/$BUILD_PIPELINE_NAME/jobs/$BUILD_JOB_NAME/builds/$BUILD_NAME|View build details>

  - name: smoke-tests-development
    serial_groups: [bosh-development]
    plan:
      - in_parallel:
          - get: tests-timer
          - get: pipeline-tasks
          - get: opensearch-release
            passed: [deploy-opensearch-development]
          - get: opensearch-stemcell-jammy
            passed: [deploy-opensearch-development]
          - get: deploy-logs-platform-config
            passed: [deploy-opensearch-development]
          - get: opensearch-development-deployment
            passed: [deploy-opensearch-development]
            trigger: true
      - task: smoke-tests
        file: pipeline-tasks/bosh-logs-errand.yml
        params:
          BOSH_ENVIRONMENT: ((bosh_development_environment))
          BOSH_CLIENT: ((bosh_client))
          BOSH_CLIENT_SECRET: ((bosh_development_client_secret))
          BOSH_DEPLOYMENT: logs-platform
          BOSH_ERRAND: smoke_tests
          BOSH_FLAGS: "--keep-alive"
          BOSH_CA_CERT: ((bosh_ca_cert_store.certificate))
    on_failure:
      put: slack
      params: 
        <<: *slack-failure-params
        text: |
          :x: Smoke tests for Platform OpenSearch in development FAILED
          <$ATC_EXTERNAL_URL/teams/$BUILD_TEAM_NAME/pipelines/$BUILD_PIPELINE_NAME/jobs/$BUILD_JOB_NAME/builds/$BUILD_NAME|View build details>

  - name: deploy-opensearch-staging
    serial_groups: [bosh-staging]
    plan:
      - in_parallel:
          - get: pipeline-tasks
          - get: deploy-logs-platform-config
            passed: [smoke-tests-development]
            trigger: true
          - get: opensearch-release
            passed: [smoke-tests-development]
            trigger: true
          - get: opensearch-stemcell-jammy
            passed: [smoke-tests-development]
            trigger: true
          - get: general-task
          - get: terraform-yaml
            resource: terraform-yaml-staging
            trigger: true
      - task: opensearch-manifest
        image: general-task
        config:
          platform: linux
          inputs:
            - name: deploy-logs-platform-config
          run:
            path: sh
            args:
              - -exc
              - |
                bosh int deploy-logs-platform-config/opensearch-base.yml \
                -o deploy-logs-platform-config/opensearch-scaling-staging.yml \
                > opensearch-manifest/manifest.yml
          outputs:
            - name: opensearch-manifest
      - task: terraform-secrets
        image: general-task
        file: deploy-logs-platform-config/ci/terraform-secrets.yml
      - put: opensearch-staging-deployment
        params:
          manifest: opensearch-manifest/manifest.yml
          releases:
            - opensearch-release/*.tgz
          stemcells:
            - opensearch-stemcell-jammy/*.tgz
          ops_files:
            - deploy-logs-platform-config/opsfiles/enable-node-tls.yml
            - deploy-logs-platform-config/opsfiles/enable-dashboard-dns.yml
            - deploy-logs-platform-config/opsfiles/enable-dashboards-tls.yml
            - deploy-logs-platform-config/opsfiles/enable-oidc-tls.yml
            - deploy-logs-platform-config/opsfiles/enable-syslog.yml
            - deploy-logs-platform-config/opsfiles/opensearch-notification.yml
            - deploy-logs-platform-config/opsfiles/add-keystore-credentials-errand.yml
          vars_files:
            - terraform-secrets/terraform.yml
    on_failure:
      put: slack
      params: 
        <<: *slack-failure-params
        text: |
          :x: FAILED to deploy platform opensearch in staging
          <$ATC_EXTERNAL_URL/teams/$BUILD_TEAM_NAME/pipelines/$BUILD_PIPELINE_NAME/jobs/$BUILD_JOB_NAME/builds/$BUILD_NAME|View build details>

  - name: upload-dashboards-objects-staging
    serial_groups: [bosh-staging]
    plan:
      - in_parallel:
          - get: pipeline-tasks
          - get: opensearch-release
          - get: opensearch-stemcell-jammy
          - get: deploy-logs-platform-config
          - get: opensearch-staging-deployment
            passed: [deploy-opensearch-staging]
            trigger: true
      - task: upload-dashboards-objects
        file: pipeline-tasks/bosh-logs-errand.yml
        params:
          BOSH_ENVIRONMENT: ((bosh_staging_environment))
          BOSH_CLIENT: ((bosh_client))
          BOSH_CLIENT_SECRET: ((bosh_staging_client_secret))
          BOSH_DEPLOYMENT: logs-platform
          BOSH_ERRAND: upload-dashboards-objects
          BOSH_FLAGS: "--keep-alive"
          BOSH_CA_CERT: ((bosh_ca_cert_store.certificate))
    on_failure:
      put: slack
      params: 
        <<: *slack-failure-params
        text: |
          :x: FAILED to upload dashboard objects for platform opensearch in staging
          <$ATC_EXTERNAL_URL/teams/$BUILD_TEAM_NAME/pipelines/$BUILD_PIPELINE_NAME/jobs/$BUILD_JOB_NAME/builds/$BUILD_NAME|View build details>

  - name: smoke-tests-staging
    serial_groups: [bosh-staging]
    plan:
      - in_parallel:
          - get: tests-timer
          - get: pipeline-tasks
          - get: opensearch-release
            passed: [deploy-opensearch-development]
          - get: opensearch-stemcell-jammy
            passed: [deploy-opensearch-development]
          - get: deploy-logs-platform-config
            passed: [deploy-opensearch-development]
          - get: opensearch-staging-deployment
            passed: [deploy-opensearch-staging]
            trigger: true
      - task: smoke-tests
        file: pipeline-tasks/bosh-logs-errand.yml
        params:
          BOSH_ENVIRONMENT: ((bosh_staging_environment))
          BOSH_CLIENT: ((bosh_client))
          BOSH_CLIENT_SECRET: ((bosh_staging_client_secret))
          BOSH_DEPLOYMENT: logs-platform
          BOSH_ERRAND: smoke_tests
          BOSH_FLAGS: "--keep-alive"
          BOSH_CA_CERT: ((bosh_ca_cert_store.certificate))
    on_failure:
      put: slack
      params: 
        <<: *slack-failure-params
        text: |
          :x: Smoke tests for Platform OpenSearch in staging FAILED
          <$ATC_EXTERNAL_URL/teams/$BUILD_TEAM_NAME/pipelines/$BUILD_PIPELINE_NAME/jobs/$BUILD_JOB_NAME/builds/$BUILD_NAME|View build details>

  - name: deploy-opensearch-production
    serial_groups: [bosh-production]
    plan:
      - in_parallel:
          - get: pipeline-tasks
          - get: deploy-logs-platform-config
            passed: [smoke-tests-staging]
            trigger: true
          - get: opensearch-release
            passed: [smoke-tests-staging]
            trigger: true
          - get: opensearch-stemcell-jammy
            passed: [smoke-tests-staging]
            trigger: true
          - get: general-task
          - get: terraform-yaml
            resource: terraform-yaml-production
            trigger: true
      - task: opensearch-manifest
        image: general-task
        config:
          platform: linux
          inputs:
            - name: deploy-logs-platform-config
          run:
            path: sh
            args:
              - -exc
              - |
                bosh int deploy-logs-platform-config/opensearch-base.yml \
                -o deploy-logs-platform-config/opensearch-scaling-production.yml \
                > opensearch-manifest/manifest.yml
          outputs:
            - name: opensearch-manifest
      - task: terraform-secrets
        image: general-task
        file: deploy-logs-platform-config/ci/terraform-secrets.yml
      - put: opensearch-production-deployment
        params:
          manifest: opensearch-manifest/manifest.yml
          releases:
            - opensearch-release/*.tgz
          stemcells:
            - opensearch-stemcell-jammy/*.tgz
          ops_files:
            - deploy-logs-platform-config/opsfiles/enable-node-tls.yml
            - deploy-logs-platform-config/opsfiles/enable-dashboard-dns.yml
            - deploy-logs-platform-config/opsfiles/enable-dashboards-tls.yml
            - deploy-logs-platform-config/opsfiles/enable-oidc-tls.yml
            - deploy-logs-platform-config/opsfiles/enable-syslog.yml
            - deploy-logs-platform-config/opsfiles/opensearch-notification.yml
            - deploy-logs-platform-config/opsfiles/add-keystore-credentials-errand.yml
          vars_files:
            - terraform-secrets/terraform.yml
    on_failure:
      put: slack
      params: 
        <<: *slack-failure-params
        text: |
          :x: FAILED to deploy platform opensearch in production
          <$ATC_EXTERNAL_URL/teams/$BUILD_TEAM_NAME/pipelines/$BUILD_PIPELINE_NAME/jobs/$BUILD_JOB_NAME/builds/$BUILD_NAME|View build details>

  - name: upload-dashboards-objects-production
    serial_groups: [bosh-production]
    plan:
      - in_parallel:
          - get: pipeline-tasks
          - get: opensearch-release
          - get: opensearch-stemcell-jammy
          - get: deploy-logs-platform-config
          - get: opensearch-production-deployment
            passed: [deploy-opensearch-production]
            trigger: true
      - task: upload-dashboards-objects
        file: pipeline-tasks/bosh-logs-errand.yml
        params:
          BOSH_ENVIRONMENT: ((bosh_production_environment))
          BOSH_CLIENT: ((bosh_client))
          BOSH_CLIENT_SECRET: ((bosh_production_client_secret))
          BOSH_DEPLOYMENT: logs-platform
          BOSH_ERRAND: upload-dashboards-objects
          BOSH_FLAGS: "--keep-alive"
          BOSH_CA_CERT: ((bosh_ca_cert_store.certificate))
    on_failure:
      put: slack
      params: 
        <<: *slack-failure-params
        text: |
          :x: FAILED to upload dashboard objects for platform opensearch in production
          <$ATC_EXTERNAL_URL/teams/$BUILD_TEAM_NAME/pipelines/$BUILD_PIPELINE_NAME/jobs/$BUILD_JOB_NAME/builds/$BUILD_NAME|View build details>

  - name: smoke-tests-production
    serial_groups: [bosh-production]
    plan:
      - in_parallel:
          - get: tests-timer
          - get: pipeline-tasks
          - get: opensearch-release
            passed: [deploy-opensearch-staging]
          - get: opensearch-stemcell-jammy
            passed: [deploy-opensearch-staging]
          - get: deploy-logs-platform-config
            passed: [deploy-opensearch-staging]
          - get: opensearch-production-deployment
            passed: [deploy-opensearch-production]
            trigger: true
      - task: smoke-tests
        file: pipeline-tasks/bosh-logs-errand.yml
        params:
          BOSH_ENVIRONMENT: ((bosh_production_environment))
          BOSH_CLIENT: ((bosh_client))
          BOSH_CLIENT_SECRET: ((bosh_production_client_secret))
          BOSH_DEPLOYMENT: logs-platform
          BOSH_ERRAND: smoke_tests
          BOSH_FLAGS: "--keep-alive"
          BOSH_CA_CERT: ((bosh_ca_cert_store.certificate))
    on_failure:
      put: slack
      params: 
        <<: *slack-failure-params
        text: |
          :x: Smoke tests for Platform OpenSearch in production FAILED
          <$ATC_EXTERNAL_URL/teams/$BUILD_TEAM_NAME/pipelines/$BUILD_PIPELINE_NAME/jobs/$BUILD_JOB_NAME/builds/$BUILD_NAME|View build details>

resources:
  - name: opensearch-release
    type: s3-iam
    source:
      bucket: ((s3-bosh-releases-bucket))
      region_name: ((aws-region))
      regexp: opensearch-([\d\.]*).tgz
      server_side_encryption: AES256

  - name: terraform-yaml-development
    type: s3-iam
    source:
      bucket: ((tf-state-bucket-development))
      versioned_file: ((tf-state-file-development))
      region_name: ((aws-region))

  - name: terraform-yaml-staging
    type: s3-iam
    source:
      bucket: ((tf-state-bucket-staging))
      versioned_file: ((tf-state-file-staging))
      region_name: ((aws-region))

  - name: terraform-yaml-production
    type: s3-iam
    source:
      bucket: ((tf-state-bucket-production))
      versioned_file: ((tf-state-file-production))
      region_name: ((aws-region))

  - name: tests-timer
    type: time
    source:
      interval: 30m
  
  - name: slack
    type: slack-notification
    source:
      url: ((slack-webhook-url))

  - name: deploy-logs-platform-config
    type: git
    source:
      commit_verification_keys: ((cloud-gov-pgp-keys))
      uri: https://github.com/cloud-gov/deploy-platform-opensearch.git
      branch: main

  - name: opensearch-stemcell-jammy
    source:
      name: bosh-aws-xen-hvm-ubuntu-jammy-go_agent
    type: bosh-io-stemcell

  - name: pipeline-tasks
    type: git
    source:
      commit_verification_keys: ((cloud-gov-pgp-keys))
      uri: https://github.com/cloud-gov/cg-pipeline-tasks.git
      branch: main

  - name: opensearch-development-deployment
    type: bosh-deployment
    source: &bosh-params-development
      target: ((bosh-director-info.development.environment))
      client: ((bosh-director-info.development.client))
      client_secret: ((bosh-director-info.development.client_secret))
      ca_cert: ((bosh-director-info.development.ca_cert))
      deployment: logs-platform
  
  - name: opensearch-staging-deployment
    type: bosh-deployment
    source: &bosh-params-staging
      target: ((bosh-director-info.staging.environment))
      client: ((bosh-director-info.staging.client))
      client_secret: ((bosh-director-info.staging.client_secret))
      ca_cert: ((bosh-director-info.staging.ca_cert))
      deployment: logs-platform

  - name: opensearch-production-deployment
    type: bosh-deployment
    source: &bosh-params-staging
      target: ((bosh-director-info.production.environment))
      client: ((bosh-director-info.production.client))
      client_secret: ((bosh-director-info.production.client_secret))
      ca_cert: ((bosh-director-info.production.ca_cert))
      deployment: logs-platform

  - name: general-task
    type: registry-image
    source:
      aws_access_key_id: ((ecr_aws_key))
      aws_secret_access_key: ((ecr_aws_secret))
      repository: general-task
      aws_region: us-gov-west-1
      tag: latest

resource_types:
  - name: slack-notification
    type: registry-image
    source:
      aws_access_key_id: ((ecr_aws_key))
      aws_secret_access_key: ((ecr_aws_secret))
      repository: slack-notification-resource
      aws_region: us-gov-west-1
      tag: latest

  - name: registry-image
    type: registry-image
    source:
      aws_access_key_id: ((ecr_aws_key))
      aws_secret_access_key: ((ecr_aws_secret))
      repository: registry-image-resource
      aws_region: us-gov-west-1
      tag: latest

  - name: bosh-deployment
    type: registry-image
    source:
      aws_access_key_id: ((ecr_aws_key))
      aws_secret_access_key: ((ecr_aws_secret))
      repository: bosh-deployment-resource
      aws_region: us-gov-west-1
      tag: latest

  - name: s3-iam
    type: registry-image
    source:
      aws_access_key_id: ((ecr_aws_key))
      aws_secret_access_key: ((ecr_aws_secret))
      repository: s3-resource
      aws_region: us-gov-west-1
      tag: latest

  - name: git
    type: registry-image
    source:
      aws_access_key_id: ((ecr_aws_key))
      aws_secret_access_key: ((ecr_aws_secret))
      repository: git-resource
      aws_region: us-gov-west-1
      tag: latest
