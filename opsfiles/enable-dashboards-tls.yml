# opensearch_dashboards
- type: replace
  path: /instance_groups/name=opensearch_dashboards/jobs/name=opensearch_dashboards/properties?/opensearch_dashboards?/server?/ssl?
  value:
    enabled: true
    certificate: ((platform_dashboard_web.certificate))
    private_key: ((platform_dashboard_web.private_key))

# variables
- type: replace
  path: /variables/name=platform_dashboard_web?
  value:
    name: platform_dashboard_web
    type: certificate
    update_mode: converge
    options:
      ca: opensearch_ca
      common_name: opensearch_dashboard.web
      alternative_names:
      - localhost
      - opensearch_dashboards.opensearch.internal
      extended_key_usage:
      - server_auth
      - client_auth
